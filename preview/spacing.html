<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--bg-0);font-family:var(--font-sans);display:flex;flex-direction:column;gap:14px}
.row{display:flex;align-items:center;gap:14px}
.lbl{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--fg-3);width:60px}
.box{background:var(--brand);height:24px;border-radius:2px}
.val{font-family:var(--font-mono);font-size:11px;color:var(--fg-2);margin-left:auto}
</style></head><body>
<div class="row"><span class="lbl">s-1</span><span class="box" style="width:4px"></span><span class="val">4px</span></div>
<div class="row"><span class="lbl">s-2</span><span class="box" style="width:8px"></span><span class="val">8px</span></div>
<div class="row"><span class="lbl">s-3</span><span class="box" style="width:12px"></span><span class="val">12px</span></div>
<div class="row"><span class="lbl">s-4</span><span class="box" style="width:16px"></span><span class="val">16px · base</span></div>
<div class="row"><span class="lbl">s-5</span><span class="box" style="width:20px"></span><span class="val">20px</span></div>
<div class="row"><span class="lbl">s-6</span><span class="box" style="width:24px"></span><span class="val">24px</span></div>
<div class="row"><span class="lbl">s-7</span><span class="box" style="width:32px"></span><span class="val">32px</span></div>
<div class="row"><span class="lbl">s-8</span><span class="box" style="width:40px"></span><span class="val">40px</span></div>
</body></html>
