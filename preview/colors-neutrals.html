<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:#202020;display:grid;grid-template-columns:repeat(4,1fr);gap:6px;height:100vh;box-sizing:border-box}
.sw{border-radius:8px;padding:10px;display:flex;flex-direction:column;justify-content:space-between;min-height:90px;font-family:var(--font-sans)}
.sw .h{font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;opacity:.7}
.sw .v{font-family:var(--font-mono);font-size:10px;opacity:.5}
.sw .n{font-weight:600;font-size:12px;margin-top:auto}
</style></head><body>
<div class="sw" style="background:#0B0E11;color:#EAECEF;border:1px solid #2B3139"><div class="h">bg-0</div><div class="n">App bg</div><div class="v">#0B0E11</div></div>
<div class="sw" style="background:#181A20;color:#EAECEF"><div class="h">bg-1</div><div class="n">Card</div><div class="v">#181A20</div></div>
<div class="sw" style="background:#1E2329;color:#EAECEF"><div class="h">bg-2</div><div class="n">Elevated</div><div class="v">#1E2329</div></div>
<div class="sw" style="background:#2B3139;color:#EAECEF"><div class="h">bg-3</div><div class="n">Input</div><div class="v">#2B3139</div></div>
<div class="sw" style="background:#181A20;color:#EAECEF"><div class="h">fg-1</div><div class="n" style="color:#EAECEF">Primary text</div><div class="v">#EAECEF</div></div>
<div class="sw" style="background:#181A20;color:#B7BDC6"><div class="h">fg-2</div><div class="n" style="color:#B7BDC6">Secondary</div><div class="v">#B7BDC6</div></div>
<div class="sw" style="background:#181A20;color:#848E9C"><div class="h">fg-3</div><div class="n" style="color:#848E9C">Tertiary</div><div class="v">#848E9C</div></div>
<div class="sw" style="background:#181A20;color:#5E6673"><div class="h">fg-4</div><div class="n" style="color:#5E6673">Disabled</div><div class="v">#5E6673</div></div>
</body></html>
