<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:var(--bg-0);font-family:var(--font-sans);display:flex;flex-direction:column;gap:8px}
.row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg-1);border-radius:8px;font-family:var(--font-mono);font-variant-numeric:tabular-nums}
.tick{font-size:12px;letter-spacing:.06em;color:var(--fg-3);width:60px;text-transform:uppercase}
.name{flex:1;font-family:var(--font-sans);font-size:13px;color:var(--fg-1)}
.val{font-size:13px;color:var(--fg-1);width:70px;text-align:right}
.delta{font-size:12px;width:80px;text-align:right;font-weight:500}
</style></head><body>
<div class="row"><span class="tick" style="color:var(--macro-protein)">PROT</span><span class="name">Protein</span><span class="val">148g</span><span class="delta pos">+12g</span></div>
<div class="row"><span class="tick" style="color:var(--macro-carbs)">CARB</span><span class="name">Carbs</span><span class="val">202g</span><span class="delta neg">-38g</span></div>
<div class="row"><span class="tick" style="color:var(--macro-fat)">FAT</span><span class="name">Fat</span><span class="val">64g</span><span class="delta pos">+4g</span></div>
<div class="row"><span class="tick" style="color:var(--macro-fiber)">FIB</span><span class="name">Fiber</span><span class="val">22g</span><span class="delta muted">—</span></div>
</body></html>
