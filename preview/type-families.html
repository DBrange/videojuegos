<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--bg-0);font-family:var(--font-sans);display:flex;gap:32px;align-items:center}
.col{display:flex;flex-direction:column;gap:8px}
.lbl{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--fg-3)}
.spec{color:var(--fg-1)}
.mono{font-family:var(--font-mono);font-feature-settings:'tnum';font-variant-numeric:tabular-nums}
</style></head><body>
<div class="col">
  <span class="lbl">Inter — sans</span>
  <span class="spec" style="font-size:36px;font-weight:700;letter-spacing:-.02em">Aa Bb Cc</span>
  <span class="spec" style="font-size:14px;color:var(--fg-2)">400 / 500 / 600 / 700</span>
</div>
<div class="col">
  <span class="lbl">JetBrains Mono — numbers</span>
  <span class="spec mono" style="font-size:36px;font-weight:600;letter-spacing:-.01em">1,847.3</span>
  <span class="spec mono" style="font-size:14px;color:var(--pos)">+12.4%</span>
  <span class="spec mono" style="font-size:14px;color:var(--neg)">-184 kcal</span>
</div>
</body></html>
