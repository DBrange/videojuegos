<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--bg-0);font-family:var(--font-sans);display:flex;gap:20px;align-items:center;justify-content:center;height:100vh;box-sizing:border-box}
.col{display:flex;flex-direction:column;align-items:center;gap:8px}
.b{width:80px;height:80px;background:var(--bg-2);border:1px solid var(--line-1)}
.lbl{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--fg-3)}
.val{font-family:var(--font-mono);font-size:11px;color:var(--fg-2)}
</style></head><body>
<div class="col"><div class="b" style="border-radius:0"></div><div class="lbl">r-0</div><div class="val">0</div></div>
<div class="col"><div class="b" style="border-radius:4px"></div><div class="lbl">r-1</div><div class="val">4px · chips</div></div>
<div class="col"><div class="b" style="border-radius:8px"></div><div class="lbl">r-2</div><div class="val">8px · btn</div></div>
<div class="col"><div class="b" style="border-radius:12px"></div><div class="lbl">r-3</div><div class="val">12px · card</div></div>
<div class="col"><div class="b" style="border-radius:999px"></div><div class="lbl">r-pill</div><div class="val">pill</div></div>
</body></html>
