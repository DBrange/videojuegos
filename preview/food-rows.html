<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:var(--bg-0);font-family:var(--font-sans);display:flex;flex-direction:column;gap:0}
.row{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--line-1)}
.thumb{width:40px;height:40px;border-radius:8px;background:var(--bg-3);display:grid;place-items:center;font-family:var(--font-mono);font-weight:700;color:var(--fg-2)}
.info{flex:1;display:flex;flex-direction:column;gap:2px}
.name{font-size:14px;color:var(--fg-1);font-weight:500}
.meta{font-family:var(--font-mono);font-size:11px;color:var(--fg-3)}
.kcal{font-family:var(--font-mono);font-size:14px;color:var(--fg-1);font-variant-numeric:tabular-nums;font-weight:500}
.delta{font-family:var(--font-mono);font-size:11px;color:var(--neg);font-variant-numeric:tabular-nums}
</style></head><body>
<div class="row"><div class="thumb" style="background:#3D2818;color:#FCD535">O</div><div class="info"><span class="name">Avena con plátano</span><span class="meta">08:14 · 250g · breakfast</span></div><div style="text-align:right"><div class="kcal">412</div><div class="delta">-412</div></div></div>
<div class="row"><div class="thumb" style="background:#1E2A2E;color:#5AC8FA">P</div><div class="info"><span class="name">Pollo a la plancha</span><span class="meta">13:42 · 180g · lunch</span></div><div style="text-align:right"><div class="kcal">298</div><div class="delta">-298</div></div></div>
<div class="row"><div class="thumb" style="background:#2A1E2E;color:#B284FF">A</div><div class="info"><span class="name">Arroz integral</span><span class="meta">13:42 · 120g · lunch</span></div><div style="text-align:right"><div class="kcal">156</div><div class="delta">-156</div></div></div>
</body></html>
