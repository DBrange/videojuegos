<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:0;background:var(--bg-0);font-family:var(--font-sans);height:100vh;display:flex;flex-direction:column}
.spacer{flex:1;display:grid;place-items:center;color:var(--fg-3);font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em}
.tabbar{position:relative;background:rgba(11,14,17,.72);backdrop-filter:blur(20px);border-top:1px solid var(--line-1);height:72px;display:flex;align-items:center;justify-content:space-around;padding:0 20px}
.tab{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--fg-3);font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em}
.tab.active{color:var(--brand)}
.dot{width:24px;height:24px;border-radius:6px;background:currentColor;opacity:.85}
.fab{width:56px;height:56px;border-radius:50%;background:var(--brand);display:grid;place-items:center;color:#0B0E11;margin-top:-24px;box-shadow:0 8px 24px rgba(252,213,53,.25);font-size:28px;font-weight:700;line-height:1}
</style></head><body>
<div class="spacer">screen content</div>
<div class="tabbar">
  <div class="tab active"><div class="dot"></div>Home</div>
  <div class="tab"><div class="dot"></div>Plan</div>
  <div class="fab">+</div>
  <div class="tab"><div class="dot"></div>Stats</div>
  <div class="tab"><div class="dot"></div>Me</div>
</div>
</body></html>
