<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:var(--bg-0);display:grid;grid-template-columns:repeat(5,1fr);gap:8px;height:100vh;box-sizing:border-box}
.sw{border-radius:8px;padding:12px;display:flex;flex-direction:column;justify-content:space-between;min-height:100px}
.sw .h{font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;opacity:.85}
.sw .v{font-family:var(--font-mono);font-size:11px;opacity:.6}
.sw .n{font-weight:600;font-size:13px;letter-spacing:-.01em;margin-top:auto}
</style></head><body>
<div class="sw" style="background:#FCD535;color:#0B0E11"><div class="h">brand</div><div class="n">Bright Sun</div><div class="v">#FCD535</div></div>
<div class="sw" style="background:#F0B90B;color:#0B0E11"><div class="h">brand-strong</div><div class="n">Gold</div><div class="v">#F0B90B</div></div>
<div class="sw" style="background:#0ECB81;color:#062E1E"><div class="h">pos</div><div class="n">Buy Green</div><div class="v">#0ECB81</div></div>
<div class="sw" style="background:#F6465D;color:#fff"><div class="h">neg</div><div class="n">Sell Red</div><div class="v">#F6465D</div></div>
<div class="sw" style="background:#5AC8FA;color:#0B0E11"><div class="h">info</div><div class="n">Info Blue</div><div class="v">#5AC8FA</div></div>
</body></html>
