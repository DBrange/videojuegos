<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--bg-0);font-family:var(--font-sans)}
.row{display:flex;align-items:baseline;gap:16px;padding:8px 0;border-bottom:1px solid var(--line-1)}
.row:last-child{border:0}
.lbl{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--fg-3);width:90px;flex-shrink:0}
.spec{flex:1}
.size{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);width:60px;text-align:right}
</style></head><body>
<div class="row"><span class="lbl">display</span><span class="spec" style="font-size:40px;font-weight:600;letter-spacing:-.02em;line-height:1;color:var(--fg-1)">1,847</span><span class="size">40 / 600</span></div>
<div class="row"><span class="lbl">h1</span><span class="spec" style="font-size:28px;font-weight:600;letter-spacing:-.02em;color:var(--fg-1)">Today's balance</span><span class="size">28 / 600</span></div>
<div class="row"><span class="lbl">h2</span><span class="spec" style="font-size:22px;font-weight:600;letter-spacing:-.02em;color:var(--fg-1)">Macros</span><span class="size">22 / 600</span></div>
<div class="row"><span class="lbl">body</span><span class="spec" style="font-size:15px;color:var(--fg-1)">Inter — primary UI typeface</span><span class="size">15 / 400</span></div>
<div class="row"><span class="lbl">caption</span><span class="spec" style="font-size:12px;color:var(--fg-2)">Mifflin-St Jeor BMR estimate</span><span class="size">12 / 400</span></div>
<div class="row"><span class="lbl">label</span><span class="spec" style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--fg-3);font-weight:500">REMAINING TODAY</span><span class="size">11 / 500</span></div>
</body></html>
