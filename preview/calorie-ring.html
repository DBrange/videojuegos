<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--bg-0);font-family:var(--font-sans);display:flex;align-items:center;justify-content:center;height:100vh;box-sizing:border-box;gap:32px}
.ring{position:relative;width:200px;height:200px;display:grid;place-items:center}
.center{text-align:center}
.kcal{font-family:var(--font-sans);font-size:40px;font-weight:600;letter-spacing:-.02em;color:var(--fg-1);font-variant-numeric:tabular-nums;line-height:1}
.lbl{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--fg-3);margin-top:6px}
.delta{font-family:var(--font-mono);font-size:13px;color:var(--pos);margin-top:6px;font-variant-numeric:tabular-nums}
.macros{display:flex;flex-direction:column;gap:14px}
.m{display:flex;flex-direction:column;gap:4px;min-width:180px}
.mhead{display:flex;justify-content:space-between;align-items:baseline}
.mlbl{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--fg-2)}
.mval{font-family:var(--font-mono);font-size:12px;color:var(--fg-1);font-variant-numeric:tabular-nums}
.bar{height:4px;background:var(--bg-2);border-radius:999px;overflow:hidden}
.fill{height:100%;border-radius:999px}
</style></head><body>
<div class="ring">
  <svg width="200" height="200" style="position:absolute;inset:0;transform:rotate(-90deg)">
    <circle cx="100" cy="100" r="86" fill="none" stroke="#1E2329" stroke-width="12"/>
    <circle cx="100" cy="100" r="86" fill="none" stroke="#FCD535" stroke-width="12" stroke-linecap="round" stroke-dasharray="540" stroke-dashoffset="160"/>
  </svg>
  <div class="center"><div class="kcal">1,847</div><div class="lbl">remaining</div><div class="delta">+184 under</div></div>
</div>
<div class="macros">
  <div class="m"><div class="mhead"><span class="mlbl">Protein</span><span class="mval">148 / 160g</span></div><div class="bar"><div class="fill" style="width:92%;background:var(--macro-protein)"></div></div></div>
  <div class="m"><div class="mhead"><span class="mlbl">Carbs</span><span class="mval">202 / 240g</span></div><div class="bar"><div class="fill" style="width:84%;background:var(--macro-carbs)"></div></div></div>
  <div class="m"><div class="mhead"><span class="mlbl">Fat</span><span class="mval">64 / 70g</span></div><div class="bar"><div class="fill" style="width:91%;background:var(--macro-fat)"></div></div></div>
</div>
</body></html>
