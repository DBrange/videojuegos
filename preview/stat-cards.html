<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--bg-0);font-family:var(--font-sans);display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:var(--bg-1);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:6px}
.lbl{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--fg-3)}
.val{font-family:var(--font-sans);font-size:24px;font-weight:600;letter-spacing:-.02em;color:var(--fg-1);font-variant-numeric:tabular-nums}
.delta{font-family:var(--font-mono);font-size:12px;font-variant-numeric:tabular-nums}
</style></head><body>
<div class="card"><span class="lbl">Streak</span><span class="val">12<span style="font-size:14px;color:var(--fg-3);font-weight:400"> days</span></span><span class="delta pos">+1 today</span></div>
<div class="card"><span class="lbl">Weight</span><span class="val">72.4<span style="font-size:14px;color:var(--fg-3);font-weight:400"> kg</span></span><span class="delta pos">-0.3 vs last week</span></div>
<div class="card"><span class="lbl">Avg kcal · 7d</span><span class="val">2,184</span><span class="delta neg">+74 vs target</span></div>
<div class="card"><span class="lbl">Water</span><span class="val">1.6<span style="font-size:14px;color:var(--fg-3);font-weight:400"> / 2.5 L</span></span><span class="delta">64% of target</span></div>
</body></html>
