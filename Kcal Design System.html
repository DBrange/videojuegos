<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kcal — Design System</title>
<link rel="stylesheet" href="tokens.css">
<style>
  html, body { height: 100%; background: #0F1115; }
  #root { height: 100vh; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="screens-1.jsx"></script>
<script type="text/babel" src="screens-2.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primary": "binance",
  "density": "comfortable",
  "cardStyle": "with-photo",
  "chartType": "line",
  "widgetVariant": "curve",
  "theme": "light"
}/*EDITMODE-END*/;

const PRIMARY_OPTIONS = {
  binance: { "--primary-500": "#F0B90B", "--primary-600": "#D4A309", label: "Binance Yellow" },
  terracotta: { "--primary-500": "#D97757", "--primary-600": "#B85F40", label: "Terracota" },
  amber: { "--primary-500": "#C2410C", "--primary-600": "#9A330A", label: "Amber tostado" },
  taupe: { "--primary-500": "#A78668", "--primary-600": "#876B53", label: "Taupe cálido" },
};

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Apply primary
  React.useEffect(() => {
    const opt = PRIMARY_OPTIONS[tweaks.primary] || PRIMARY_OPTIONS.binance;
    document.documentElement.style.setProperty("--primary-500", opt["--primary-500"]);
    document.documentElement.style.setProperty("--primary-600", opt["--primary-600"]);
  }, [tweaks.primary]);

  React.useEffect(() => {
    document.documentElement.setAttribute("data-density", tweaks.density);
  }, [tweaks.density]);

  React.useEffect(() => {
    document.documentElement.setAttribute("data-theme", tweaks.theme);
  }, [tweaks.theme]);

  const screens = [
    { id: "home",    label: "Home — Hoy",        Comp: HomeScreen, w: 393, h: 852 },
    { id: "search",  label: "Búsqueda",          Comp: SearchScreen, w: 393, h: 852 },
    { id: "detail",  label: "Detalle alimento",  Comp: FoodDetailScreen, w: 393, h: 852 },
    { id: "compare", label: "Comparador",        Comp: ComparatorScreen, w: 393, h: 852 },
    { id: "stats",   label: "Progreso",          Comp: StatsScreen, w: 393, h: 852 },
    { id: "meal",    label: "Detalle comida",    Comp: MealDetailScreen, w: 393, h: 852 },
  ];

  return (
    <>
      <DesignCanvas title="Kcal — Design System" subtitle="App de tracking nutricional · estilo plano · paleta Binance">
        <DCSection id="screens" title="Pantallas principales">
          {screens.map(s => (
            <DCArtboard key={s.id} id={s.id} label={s.label} width={s.w} height={s.h}>
              <PhoneFrame>
                <s.Comp
                  cardStyle={tweaks.cardStyle}
                  chartType={tweaks.chartType}
                  widgetVariant={tweaks.widgetVariant}
                />
              </PhoneFrame>
            </DCArtboard>
          ))}
        </DCSection>

        <DCSection id="tokens" title="Sistema de diseño">
          <DCArtboard id="palette" label="Paleta" width={520} height={620}>
            <PaletteSheet/>
          </DCArtboard>
          <DCArtboard id="type" label="Tipografía" width={520} height={620}>
            <TypeSheet/>
          </DCArtboard>
          <DCArtboard id="components" label="Componentes" width={520} height={620}>
            <ComponentsSheet/>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Tema y densidad">
          <TweakRadio label="Tema" value={tweaks.theme} onChange={v => setTweak("theme", v)}
            options={[{value:"light",label:"Claro"},{value:"dark",label:"Oscuro"}]}/>
          <TweakRadio label="Densidad" value={tweaks.density} onChange={v => setTweak("density", v)}
            options={[{value:"comfortable",label:"Cómoda"},{value:"compact",label:"Compacta"}]}/>
        </TweakSection>
        <TweakSection label="Color primario">
          <TweakSelect label="Primary" value={tweaks.primary} onChange={v => setTweak("primary", v)}
            options={Object.entries(PRIMARY_OPTIONS).map(([k, v]) => ({ value: k, label: v.label }))}/>
        </TweakSection>
        <TweakSection label="Variantes visuales">
          <TweakSelect label="Widget de calorías" value={tweaks.widgetVariant} onChange={v => setTweak("widgetVariant", v)}
            options={[
              { value: "curve", label: "Curva (Fitia)" },
              { value: "ring", label: "Anillo simple" },
              { value: "donut", label: "Donut por macro" },
            ]}/>
          <TweakRadio label="Food cards" value={tweaks.cardStyle} onChange={v => setTweak("cardStyle", v)}
            options={[{value:"with-photo",label:"Con foto"},{value:"minimal",label:"Mínima"}]}/>
          <TweakSelect label="Gráfico de peso" value={tweaks.chartType} onChange={v => setTweak("chartType", v)}
            options={[
              { value: "line", label: "Línea" },
              { value: "bar", label: "Barras" },
              { value: "area", label: "Área" },
            ]}/>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

const PhoneFrame = ({ children }) => (
  <IOSDevice dark={false}>
    {children}
  </IOSDevice>
);

/* === Sheets === */
const PaletteSheet = () => (
  <div style={{ background: "#fff", height: "100%", padding: 24, fontFamily: "var(--font-sans)", overflow: "auto" }}>
    <div style={{ fontSize: 11, color: "var(--text-tertiary)", textTransform: "uppercase", letterSpacing: 0.4, fontWeight: 600 }}>Paleta</div>
    <div style={{ fontSize: 22, fontWeight: 700, marginTop: 4, marginBottom: 18 }}>Color</div>

    <Group title="Primary (Binance Yellow)">
      <Swatch c="#FFF8E1" name="50" dark/>
      <Swatch c="#FFD54F" name="300" dark/>
      <Swatch c="#F0B90B" name="500"/>
      <Swatch c="#D4A309" name="600"/>
      <Swatch c="#8C6D05" name="800"/>
    </Group>

    <Group title="Semánticos">
      <Swatch c="#02C076" name="success"/>
      <Swatch c="#F6465D" name="danger"/>
      <Swatch c="#5B7CFA" name="info"/>
    </Group>

    <Group title="Macros (no moralizan)">
      <Swatch c="#02C076" name="proteína"/>
      <Swatch c="#F0B90B" name="carbos"/>
      <Swatch c="#E07856" name="grasa"/>
      <Swatch c="#8B6FB8" name="fibra"/>
      <Swatch c="#4DA3F2" name="agua"/>
    </Group>

    <Group title="Neutros (cálidos)">
      <Swatch c="#FFFFFF" name="bg" dark/>
      <Swatch c="#FAFAFA" name="surface" dark/>
      <Swatch c="#E8E8E8" name="border" dark/>
      <Swatch c="#707A8A" name="text-2"/>
      <Swatch c="#0B0E11" name="text-1"/>
    </Group>
  </div>
);

const Group = ({ title, children }) => (
  <div style={{ marginBottom: 18 }}>
    <div style={{ fontSize: 12, color: "var(--text-secondary)", fontWeight: 600, marginBottom: 8 }}>{title}</div>
    <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>{children}</div>
  </div>
);

const Swatch = ({ c, name, dark }) => (
  <div style={{ width: 88 }}>
    <div style={{ height: 56, borderRadius: 10, background: c, border: "1px solid var(--border)" }}/>
    <div style={{ fontSize: 11, color: "var(--text-secondary)", marginTop: 4, fontWeight: 600 }}>{name}</div>
    <div className="mono" style={{ fontSize: 10, color: "var(--text-tertiary)" }}>{c.toUpperCase()}</div>
  </div>
);

const TypeSheet = () => (
  <div style={{ background: "#fff", height: "100%", padding: 24, overflow: "auto" }}>
    <div style={{ fontSize: 11, color: "var(--text-tertiary)", textTransform: "uppercase", letterSpacing: 0.4, fontWeight: 600 }}>Tipografía</div>
    <div style={{ fontSize: 22, fontWeight: 700, marginTop: 4, marginBottom: 18 }}>SF Pro · SF Mono</div>
    {[
      { size: 32, weight: 700, label: "Display · 32 / 700", text: "2,247 kcal" },
      { size: 28, weight: 700, label: "H1 · 28 / 700", text: "Hoy" },
      { size: 22, weight: 700, label: "H2 · 22 / 700", text: "Milanesa de pollo" },
      { size: 18, weight: 600, label: "H3 · 18 / 600", text: "Almuerzo · 678 kcal" },
      { size: 15, weight: 500, label: "Body · 15 / 500", text: "Avena con banana y miel" },
      { size: 13, weight: 500, label: "Sm · 13 / 500", text: "1 taza · 250 g · Casero" },
      { size: 11, weight: 600, label: "XS · 11 / 600 (uppercase)", text: "VERIFICADO", upper: true },
    ].map((s, i) => (
      <div key={i} style={{ padding: "10px 0", borderTop: i ? "1px solid var(--divider)" : "none" }}>
        <div style={{ fontSize: 10, color: "var(--text-tertiary)", marginBottom: 4 }} className="mono">{s.label}</div>
        <div style={{ fontSize: s.size, fontWeight: s.weight, letterSpacing: s.size > 24 ? "-0.4px" : "0", textTransform: s.upper ? "uppercase" : "none" }}>
          {s.text}
        </div>
      </div>
    ))}
    <div style={{ marginTop: 18, padding: 12, background: "var(--surface-2)", borderRadius: 10 }}>
      <div className="mono" style={{ fontSize: 12, fontWeight: 600 }}>2,247 / 1,842 kcal</div>
      <div style={{ fontSize: 10, color: "var(--text-tertiary)", marginTop: 4 }}>SF Mono · números tabulares</div>
    </div>
  </div>
);

const ComponentsSheet = () => (
  <div style={{ background: "#fff", height: "100%", padding: 20, overflow: "auto", fontFamily: "var(--font-sans)" }}>
    <div style={{ fontSize: 11, color: "var(--text-tertiary)", textTransform: "uppercase", letterSpacing: 0.4, fontWeight: 600 }}>Componentes</div>
    <div style={{ fontSize: 22, fontWeight: 700, marginTop: 4, marginBottom: 14 }}>Building blocks</div>

    <SubH>Buttons</SubH>
    <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
      <div style={{ padding: "10px 16px", background: "var(--primary-500)", color: "#0B0E11", borderRadius: 10, fontSize: 13, fontWeight: 700 }}>Primary</div>
      <div style={{ padding: "10px 16px", border: "1px solid var(--border-strong)", borderRadius: 10, fontSize: 13, fontWeight: 600 }}>Secondary</div>
      <div style={{ padding: "10px 16px", background: "var(--surface-2)", borderRadius: 10, fontSize: 13, fontWeight: 500, color: "var(--text-secondary)" }}>Ghost</div>
      <div style={{ padding: "10px 16px", background: "var(--success-500)", color: "#fff", borderRadius: 10, fontSize: 13, fontWeight: 700 }}>Comprar</div>
      <div style={{ padding: "10px 16px", background: "var(--danger-500)", color: "#fff", borderRadius: 10, fontSize: 13, fontWeight: 700 }}>Vender</div>
    </div>

    <SubH>Pills / Tabs</SubH>
    <div style={{ display: "flex", gap: 6, marginBottom: 16 }}>
      <Pill active>Activa</Pill>
      <Pill>Inactiva</Pill>
      <Pill>Otra</Pill>
    </div>

    <SubH>Macro bar</SubH>
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginBottom: 16 }}>
      <MacroBlock label="Proteína" current={124} target={168} unit="g" color="var(--macro-protein)"/>
      <MacroBlock label="Carbos"   current={198} target={252} unit="g" color="var(--macro-carbs)"/>
      <MacroBlock label="Grasa"    current={62}  target={75}  unit="g" color="var(--macro-fat)"/>
    </div>

    <SubH>Score badge</SubH>
    <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
      <div style={{ padding: "4px 10px", borderRadius: 999, background: "var(--success-50)", color: "var(--success-600)", fontSize: 12, fontWeight: 700 }}>Score 84</div>
      <div style={{ padding: "4px 10px", borderRadius: 999, background: "#FFF8E1", color: "var(--primary-700)", fontSize: 12, fontWeight: 700 }}>Score 62</div>
      <div style={{ padding: "4px 10px", borderRadius: 999, background: "var(--danger-50)", color: "var(--danger-600)", fontSize: 12, fontWeight: 700 }}>Score 38</div>
    </div>

    <SubH>Food card</SubH>
    <div style={{ border: "1px solid var(--border)", borderRadius: 10 }}>
      <div style={{ padding: "0 12px" }}>
        <FoodRow name="Avena con banana y miel" brand="Casero" qty="1 taza · 250 g" kcal={287} swatch="#E8DCC4"/>
      </div>
    </div>
  </div>
);

const SubH = ({ children }) => (
  <div style={{ fontSize: 10, color: "var(--text-tertiary)", textTransform: "uppercase", letterSpacing: 0.4, fontWeight: 600, marginBottom: 8 }}>{children}</div>
);

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
